name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - name: Unzip project
        run: |
          unzip ArizonaMobile_Project.zip -d outer
          

      - name: Build APK
        run: |
          cd outer/ArizonaMobile
          chmod +x gradlew || true
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ArizonaMobile-APK
          path: outer/ArizonaMobile/app/build/outputs/apk/debug/*.apk
